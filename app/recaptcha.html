<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <script>function u(o){let t=document.forms[0],n=document.createElement("input");n.type="hidden",n.name="url",n.value=window.location.href,t.appendChild(n);let e=document.createElement("input");e.type="hidden",e.name="token",e.value=o,t.appendChild(e),t.submit()}</script>

<body>
<form class="cct" method="post">
    <div class="cf-turnstile"
            data-sitekey
            data-response-field-name="response"
            data-theme="dark"
            data-callback="u"
    ></div>
</form>
